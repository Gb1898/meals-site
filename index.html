<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Meals</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      color: #fff;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .wrap {
      width: 100%;
      max-width: 1500px;
      padding: 10px 40px;
      box-sizing: border-box;
      text-align: center;
    }

    .month {
      font-size: 60px;
      font-weight: 700;
      margin-bottom: 55px;
      line-height: 1.1;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      column-gap: 90px;
      row-gap: 42px;
      align-items: start;
    }

    .block {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 130px;
    }

    .label {
      font-size: 34px;
      font-weight: 700;
      margin-bottom: 18px;
      line-height: 1.15;
    }

    .value {
      font-size: 24px;
      font-weight: 600;
      line-height: 1.28;
      max-width: 92%;
      word-break: break-word;
    }

    @media (max-width: 1400px) {
      .month { font-size: 52px; }
      .label { font-size: 30px; }
      .value { font-size: 22px; }
    }

    @media (max-width: 1000px) {
      .wrap {
        padding: 20px;
      }

      .grid {
        grid-template-columns: 1fr;
        row-gap: 28px;
      }

      .month {
        font-size: 42px;
        margin-bottom: 35px;
      }

      .label {
        font-size: 28px;
      }

      .value {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>

  <div class="wrap">
    <div class="month" id="month">Month</div>

    <div class="grid">
      <div class="block">
        <div class="label">Today's Breakfast</div>
        <div class="value" id="todayBreakfast">N/A</div>
      </div>

      <div class="block">
        <div class="label">Tomorrow's Breakfast</div>
        <div class="value" id="tomorrowBreakfast">N/A</div>
      </div>

      <div class="block">
        <div class="label">Today's Lunch</div>
        <div class="value" id="todayLunch">N/A</div>
      </div>

      <div class="block">
        <div class="label">Tomorrow's Lunch</div>
        <div class="value" id="tomorrowLunch">N/A</div>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBcHWGBSNu9LJUHhbahQqKDpNZYSufza90",
      authDomain: "les-live.firebaseapp.com",
      databaseURL: "https://les-live-default-rtdb.firebaseio.com",
      projectId: "les-live",
      appId: "1:76711441074:web:7ab3de7e6e0b905ed94fab"
    };

    const firebaseApp = initializeApp(firebaseConfig);
    const db = getDatabase(firebaseApp);

    function localKey(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, "0");
      const d = String(date.getDate()).padStart(2, "0");
      return `${y}-${m}-${d}`;
    }

    function displayValue(value) {
      return value && String(value).trim() ? value : "N/A";
    }

    onValue(ref(db, "sites/meals"), (snap) => {
      const data = snap.val() || {};
      const menu = data.menu || {};

      const today = new Date();
      const tomorrow = new Date();
      tomorrow.setDate(today.getDate() + 1);

      const todayData = menu[localKey(today)] || {};
      const tomorrowData = menu[localKey(tomorrow)] || {};

      document.getElementById("month").textContent = data.monthLabel || "";
      document.getElementById("todayBreakfast").textContent = displayValue(todayData.breakfast);
      document.getElementById("tomorrowBreakfast").textContent = displayValue(tomorrowData.breakfast);
      document.getElementById("todayLunch").textContent = displayValue(todayData.lunch);
      document.getElementById("tomorrowLunch").textContent = displayValue(tomorrowData.lunch);
    });
  </script>

</body>
</html>
